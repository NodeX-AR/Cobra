<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1e1e1e">
    <title>Python IDE Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>Python IDE</h1>
            <div class="status">
                <span id="statusIndicator" class="indicator"></span>
                <span id="statusText">Initializing...</span>
            </div>
        </header>

        <main class="main">
            <div class="editor-panel">
                <div class="panel-header">
                    <span>Code</span>
                    <div class="panel-actions">
                        <button id="clearBtn" class="btn-icon" title="Clear">Clear</button>
                    </div>
                </div>
                <textarea id="editor" class="editor" spellcheck="false"># Welcome to Python IDE
# Write your code below

print("Hello, World!")

# Calculate sum
numbers = [1, 2, 3, 4, 5]
total = sum(numbers)
print(f"Sum: {total}")

# Try importing libraries
try:
    import numpy as np
    arr = np.array([1, 2, 3])
    print(f"Array: {arr}")
except:
    print("NumPy not available")
</textarea>
            </div>

            <div class="output-panel">
                <div class="panel-header">
                    <span>Output</span>
                    <div class="panel-actions">
                        <button id="copyBtn" class="btn-icon" title="Copy">Copy</button>
                        <button id="clearOutputBtn" class="btn-icon" title="Clear">Clear</button>
                    </div>
                </div>
                <pre id="output" class="output">Ready to run code...</pre>
            </div>
        </main>

        <footer class="footer">
            <button id="runBtn" class="btn-primary" disabled>Run Code</button>
            <span class="shortcut-hint">Ctrl + Enter to run</span>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
    <script src="script.js"></script>
</body>
</html>
