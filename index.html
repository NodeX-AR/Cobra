<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COBRA - Python IDE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="title-section">
                <h1>COBRA</h1>
                <span class="badge">Python IDE</span>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <span class="label">Status</span>
                <span id="statusText" class="value">Ready</span>
            </div>
            <div class="status-item">
                <span class="label">Mode</span>
                <span id="modeText" class="value">Local</span>
            </div>
            <div class="status-item">
                <span class="label">Cache</span>
                <span id="cacheText" class="value">0 packages</span>
            </div>
        </div>

        <div class="main-container">
            <div class="editor-panel">
                <div class="panel-header">
                    <span class="title">Python Code</span>
                    <div class="actions">
                        <select id="exampleSelect">
                            <option value="">Load Example</option>
                            <option value="basic">Basic Python</option>
                            <option value="numpy">NumPy Example</option>
                            <option value="pandas">Pandas Example</option>
                            <option value="torch">PyTorch Example</option>
                        </select>
                        <button id="runBtn" class="btn-primary">Run Code</button>
                    </div>
                </div>
                <textarea id="codeEditor" class="editor" spellcheck="false"># COBRA Python IDE
# Write your code here

print("Hello from COBRA")

import numpy as np
arr = np.array([1, 2, 3, 4, 5])
print(f"Array mean: {arr.mean()}")</textarea>
            </div>

            <div class="output-panel">
                <div class="panel-header">
                    <span class="title">Output</span>
                    <button id="clearBtn" class="btn-text">Clear</button>
                </div>
                <div id="outputArea" class="output"></div>
            </div>
        </div>

        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-container">
                <div class="spinner"></div>
                <div id="loadingMessage" class="loading-text">Processing...</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="js/core/engine.js"></script>
</body>
</html>
