name: Sync Python Libraries

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-libraries:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install pipdeptree
      run: pip install pipdeptree
    
    - name: Read and process lib.txt
      run: |
        mkdir -p libs
        if [ -f lib.txt ]; then
          # Read each line from lib.txt
          while IFS= read -r package; do
            if [ ! -z "$package" ] && [[ ! "$package" =~ ^# ]]; then
              echo "Downloading $package..."
              pip download --no-deps --dest libs "$package" || echo "Failed to download $package"
            fi
          done < lib.txt
        else
          echo "lib.txt not found, creating default"
          echo "numpy" > lib.txt
          echo "requests" >> lib.txt
          pip download --no-deps --dest libs numpy requests
        fi
    
    - name: Download dependencies recursively
      run: |
        if [ -f lib.txt ]; then
          while IFS= read -r package; do
            if [ ! -z "$package" ] && [[ ! "$package" =~ ^# ]]; then
              echo "Downloading dependencies for $package..."
              pip download --dest libs "$package" || true
            fi
          done < lib.txt
        fi
    
    - name: Generate manifest
      run: |
        cd libs
        ls -la > manifest.txt
        find . -name "*.whl" -o -name "*.tar.gz" -o -name "*.zip" | sort > files.txt
        cd ..
    
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add libs/ lib.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Weekly library sync [skip ci]"
        git push
