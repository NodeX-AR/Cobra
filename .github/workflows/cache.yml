name: Update Library Cache

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Create cache directories
        run: |
          mkdir -p cache/site-packages
          mkdir -p cache/wheels
      
      - name: Read and download libraries
        run: |
          # Read all libraries from lib.txt (skip comments and empty lines)
          cat lib.txt | grep -v '^#' | grep -v '^$' > libraries.txt
          
          echo "Total libraries to process: $(wc -l < libraries.txt)"
          
          # Create Python script to download libraries
          cat > download.py << 'EOF'
          import subprocess
          import sys
          import os
          
          # Read libraries
          with open('libraries.txt', 'r') as f:
              libraries = [line.strip() for line in f if line.strip()]
          
          success = []
          failed = []
          
          for lib in libraries:
              print(f"\nProcessing: {lib}")
              
              # Try to download wheel
              result = subprocess.run(
                  [sys.executable, '-m', 'pip', 'download', '--no-deps', '--dest', 'cache/wheels', lib],
                  capture_output=True, text=True
              )
              
              if result.returncode == 0:
                  print(f"  Downloaded: {lib}")
                  success.append(lib)
              else:
                  print(f"  Failed: {lib}")
                  failed.append(lib)
              
              # Try to install to site-packages
              subprocess.run(
                  [sys.executable, '-m', 'pip', 'install', '--target', 'cache/site-packages', lib],
                  capture_output=True, text=True
              )
          
          # Write results
          with open('cache/success.txt', 'w') as f:
              f.write('\n'.join(success))
          
          with open('cache/failed.txt', 'w') as f:
              f.write('\n'.join(failed))
          
          print(f"\nSuccess: {len(success)}")
          print(f"Failed: {len(failed)}")
          EOF
          
          python download.py
      
      - name: Create metadata
        run: |
          cat > cache/metadata.json << EOF
          {
            "updated": "$(date -Iseconds)",
            "total_libraries": $(wc -l < libraries.txt),
            "successful": $(cat cache/success.txt 2>/dev/null | wc -l),
            "failed": $(cat cache/failed.txt 2>/dev/null | wc -l)
          }
          EOF
          
          # Create library index
          ls cache/wheels/ 2>/dev/null | grep -v '^$' > cache/wheel-index.txt || echo "No wheels" > cache/wheel-index.txt
          ls cache/site-packages/ 2>/dev/null > cache/lib-index.txt || echo "No libs" > cache/lib-index.txt
          
          echo "## Cache Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Total libraries: $(wc -l < libraries.txt)" >> $GITHUB_STEP_SUMMARY
          echo "- Wheels downloaded: $(cat cache/wheel-index.txt | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Packages installed: $(cat cache/lib-index.txt | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Updated at: $(date)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-library-cache
          path: cache/
          retention-days: 7
      
      - name: Save to GitHub Cache
        uses: actions/cache/save@v4
        with:
          path: cache/
          key: python-cache-${{ github.run_id }}

  create-master-cache:
    runs-on: ubuntu-latest
    needs: build-cache
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-library-cache
          path: master-cache
      
      - name: Upload master cache
        uses: actions/upload-artifact@v4
        with:
          name: master-python-cache
          path: master-cache/
          retention-days: 30
